# Render Blueprint for the Theia ASP. Set all secrets in the Render dashboard
# (Environment), never here. Full list is in .env.example.
services:
  - type: web
    name: theia-asp
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Public HTTPS URL of this service (permanent on-chain once registered).
      - key: ASP_PUBLIC_URL
        sync: false
      # Market-data keys for real reads (fresh, ASP-only).
      - key: COINALYZE_API_KEY
        sync: false
      - key: MORALIS_API_KEY
        sync: false
      # Optional Singapore relay for geo-blocked Binance/Bybit data.
      - key: RELAY_BASE_URL
        sync: false
      - key: BYBIT_PROXY_SECRET
        sync: false
      # x402 settlement (keep 0 until payTo + asset + facilitator are set).
      - key: X402_ENFORCE
        value: "0"
      - key: X402_PAY_TO
        sync: false
      - key: X402_ASSET_USDT_ADDRESS
        sync: false
      - key: X402_FACILITATOR_URL
        sync: false
