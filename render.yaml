# Render Blueprint for the Theia ASP. Set all secrets in the Render dashboard
# (Environment), never here. Full list is in .env.example.
# Region is singapore so the host reaches OKX directly (no relay needed).
services:
  - type: web
    name: theia-asp
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Public HTTPS URL of this service (permanent on-chain once registered).
      - key: ASP_PUBLIC_URL
        sync: false
      # OKX reachable directly from Singapore; no relay needed.
      - key: ASP_ENABLE_OKX_MARKET_DATA
        value: "1"
      # Market-data keys (neutral aggregators + on-chain).
      - key: COINGECKO_API_KEY
        sync: false
      - key: COINALYZE_API_KEY
        sync: false
      - key: MORALIS_API_KEY
        sync: false
      # x402 settlement (keep 0 until payTo + asset + facilitator are set).
      - key: X402_ENFORCE
        value: "0"
      - key: X402_PAY_TO
        sync: false
      - key: X402_ASSET_USDT_ADDRESS
        sync: false
      - key: X402_FACILITATOR_URL
        sync: false
